version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: campus-mysql
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: campus
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  nacos:
    image: nacos/nacos-server:v2.3.0
    container_name: campus-nacos
    environment:
      MODE: standalone
      SPRING_DATASOURCE_PLATFORM: ""
      JVM_XMS: 256m
      JVM_XMX: 256m
    ports:
      - "8848:8848"
      - "9848:9848"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8848/nacos/v1/console/health/readiness"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: campus-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: elasticsearch-ik:8.12.0
    container_name: campus-es
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ==================== Java 微服务 ====================

  # Gateway 网关
  gateway:
    build:
      context: ./backend
      dockerfile: campus-gateway/Dockerfile
    container_name: campus-gateway
    ports:
      - "9000:9000"
    environment:
      NACOS_ADDR: nacos:8848
    depends_on:
      - nacos

  # 用户服务
  campus-user:
    build:
      context: ./backend
      dockerfile: campus-user/Dockerfile
    container_name: campus-user
    ports:
      - "8081:8081"
    environment:
      NACOS_ADDR: nacos:8848
      MYSQL_HOST: mysql
      MYSQL_PASSWORD: 123456
      REDIS_HOST: redis
      REDIS_PASSWORD: 123456
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      nacos:
        condition: service_healthy

  # 交易服务
  campus-trade:
    build:
      context: ./backend
      dockerfile: campus-trade/Dockerfile
    container_name: campus-trade
    ports:
      - "8082:8082"
    environment:
      NACOS_ADDR: nacos:8848
      MYSQL_HOST: mysql
      MYSQL_PASSWORD: 123456
      REDIS_HOST: redis
      REDIS_PASSWORD: 123456
      ELASTICSEARCH_HOST: elasticsearch
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      nacos:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy

  # 论坛服务
  campus-forum:
    build:
      context: ./backend
      dockerfile: campus-forum/Dockerfile
    container_name: campus-forum
    ports:
      - "8083:8083"
    environment:
      NACOS_ADDR: nacos:8848
      MYSQL_HOST: mysql
      MYSQL_PASSWORD: 123456
      REDIS_HOST: redis
      REDIS_PASSWORD: 123456
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      nacos:
        condition: service_healthy

  # AI咨询服务
  campus-ai-consult:
    build:
      context: ./backend
      dockerfile: campus-ai/Dockerfile
    container_name: campus-ai-consult
    ports:
      - "8084:8084"
    environment:
      NACOS_ADDR: nacos:8848
      MYSQL_HOST: mysql
      MYSQL_PASSWORD: 123456
      REDIS_HOST: redis
      REDIS_PASSWORD: 123456
      AI_SERVICE_URL: http://ai-service:8000
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      nacos:
        condition: service_healthy
      ai-service:
        condition: service_started

  # 管理服务
  campus-admin:
    build:
      context: ./backend
      dockerfile: campus-admin/Dockerfile
    container_name: campus-admin
    ports:
      - "8085:8085"
    environment:
      NACOS_ADDR: nacos:8848
      MYSQL_HOST: mysql
      MYSQL_PASSWORD: 123456
      REDIS_HOST: redis
      REDIS_PASSWORD: 123456
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      nacos:
        condition: service_healthy

  # ==================== Nginx ====================
  nginx:
    image: nginx:alpine
    container_name: campus-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./frontend/dist:/usr/share/nginx/html
    depends_on:
      - gateway

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: campus-ai
    ports:
      - "8000:8000"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-sk-f168b9cb60b44733962a64ef3570860c}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.deepseek.com}
      LLM_MODEL: ${LLM_MODEL:-deepseek-chat}
    volumes:
      - ./ai-service/knowledge:/app/knowledge
      - ai_chroma_data:/app/chroma_data

volumes:
  mysql_data:
  redis_data:
  es_data:
  ai_chroma_data:
