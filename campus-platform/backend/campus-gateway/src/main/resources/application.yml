server:
  port: 9000

spring:
  application:
    name: campus-gateway

  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:localhost:8848}

    gateway:
      routes:
        # 用户服务
        - id: campus-user
          uri: lb://campus-user-service
          predicates:
            - Path=/api/auth/**, /api/user/**, /api/address/**, /api/admin/users/**

        # 交易服务
        - id: campus-trade
          uri: lb://campus-trade-service
          predicates:
            - Path=/api/goods/**, /api/orders/**, /api/chat/**, /api/categories/**,
                   /api/reviews/**, /api/favorites/**, /api/follow/**,
                   /api/disputes/**, /api/delivery/**, /api/reports/**,
                   /api/crazy-thursday/**, /api/notifications/**, /api/upload/**,
                   /api/admin/goods/**, /api/admin/orders/**,
                   /api/admin/disputes/**, /api/admin/reports/**

        # 论坛服务
        - id: campus-forum
          uri: lb://campus-forum-service
          predicates:
            - Path=/api/forum/**, /api/admin/forum/**

        # AI咨询服务
        - id: campus-ai-consult
          uri: lb://campus-ai-consult-service
          predicates:
            - Path=/api/ai/**, /api/admin/knowledge/**

        # 管理服务
        - id: campus-admin
          uri: lb://campus-admin-service
          predicates:
            - Path=/api/admin/dashboard/**, /api/admin/config/**, /api/admin/bans/**

        # 公告接口（campus-common 中，挂载到 admin 服务）
        - id: campus-announcements
          uri: lb://campus-admin-service
          predicates:
            - Path=/api/announcements/**

        # WebSocket 路由
        - id: campus-trade-ws
          uri: lb:ws://campus-trade-service
          predicates:
            - Path=/ws/chat/**

        # 上传文件静态资源
        - id: campus-uploads
          uri: lb://campus-trade-service
          predicates:
            - Path=/uploads/**

      # 默认过滤器
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    org.springframework.cloud.gateway: debug
